name: Build Ultra and Deploy to Pages

on:
  push:
    branches: [ "mbu-port" ]          # only run when Ultra branch is updated
  workflow_dispatch:                   # allow manual trigger

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository (mbu-port)
        uses: actions/checkout@v4
        with:
          ref: mbu-port                 # build Ultra specifically
          path: ultra-source

      - name: Setup Haxe
        uses: krdlab/setup-haxe@v1
        with:
          haxe-version: 4.3.4

      # ---------- 🔍 CRITICAL: Replace the line below with the correct Heaps URL ----------
      - name: Install Haxelib libraries
        working-directory: ./ultra-source
        run: |
          haxelib install hxcpp
          haxelib install lime
          haxelib install openfl
          # 🔻 REPLACE THE NEXT LINE WITH THE CORRECT HEAPS COMMAND (see instructions below)
          haxelib git heaps https://github.com/HeapsIO/heaps.git 2.0.0   # <-- CHANGE THIS
          # 🔺
          haxelib install colyseus-websocket
          haxelib git datachannel https://github.com/RandomityGuy/hxdatachannel
          haxelib install stb_ogg_sound
          haxelib install zip 1.1.0
          haxelib list

      - name: Build Ultra (HTML5)
        working-directory: ./ultra-source
        run: haxe compile-js.hxml

      - name: Prepare output folder
        run: |
          mkdir -p public/ultra
          cp -r ultra-source/index.html ultra-source/data ultra-source/bin public/ultra/ 2>/dev/null || true
          # if bin folder doesn't exist, copy any generated .js files
          if [ ! -d "public/ultra/bin" ]; then
            cp ultra-source/*.js public/ultra/ 2>/dev/null || true
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './public'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

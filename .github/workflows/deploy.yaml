name: Deploy to Kubernetes

on:
  push:
    branches: [ "main" ]

env:
  IMAGE_REGISTRY: ghcr.io/OWNER        # e.g., ghcr.io/youruser or docker.io/youruser
  IMAGE_NAME: APP_NAME                 # e.g., myapp
  IMAGE_TAG: ${{ github.sha }}
  K8S_NAMESPACE: APP_NAMESPACE
  DEPLOY_FILE: deploy.yaml             # path to your Kubernetes manifest

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # If using Docker Hub or another registry with username/password:
      - name: Log in to container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.IMAGE_REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          push: true
          tags: ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}

      - name: Set up kubeconfig
        run: |
          mkdir -p "${HOME}/.kube"
          echo "${KUBE_CONFIG_DATA}" | base64 -d > "${HOME}/.kube/config"
        env:
          KUBE_CONFIG_DATA: ${{ secrets.KUBE_CONFIG_DATA }}

      - name: Substitute image and namespace in manifest
        run: |
          sed -i "s|APP_NAMESPACE|${K8S_NAMESPACE}|g" "${DEPLOY_FILE}"
          sed -i "s|APP_IMAGE|${IMAGE_REGISTRY}/${IMAGE_NAME}:${IMAGE_TAG}|g" "${DEPLOY_FILE}"

      - name: Deploy to cluster
        run: kubectl apply -f "${DEPLOY_FILE}"

      - name: Wait for rollout
        run: kubectl rollout status deploy/APP_NAME -n "${K8S_NAMESPACE}" --timeout=120s

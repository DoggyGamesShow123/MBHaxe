name: Build & Deploy MBHaxe (JS → GitHub Pages subfolder)

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: mbhaxe-pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      # Java (required by some Haxe toolchains / actions)
      - name: Set up Java (Temurin 21)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      # Haxe 4.3.x (MBHaxe requires ≥4.3.0)
      - name: Set up Haxe
        uses: krdlab/setup-haxe@v2
        with:
          haxe-version: "4.3.7"

      # Node is needed because the Haxe 'uglifyjs' lib shells out to the 'uglify-js' Node binary.
      - name: Set up Node (for uglifyjs minification)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install uglify-js npm package (local)
        run: |
          npm init -y >/dev/null 2>&1 || true
          npm install uglify-js --save-dev --no-audit --no-fund
          # Put node_modules/.bin on PATH so 'uglifyjs' is discoverable
          echo "$(npm bin)" >> "$GITHUB_PATH"

      # ---- haxelib repo init (DO NOT write to ~/.haxelib as a directory) ----
      - name: Initialize haxelib repo (idempotent)
        shell: bash
        run: |
          if [ ! -f "$HOME/.haxelib" ]; then
            mkdir -p "$HOME/haxelib"
            haxelib setup "$HOME/haxelib"
          else
            echo "haxelib already configured at: $(cat "$HOME/.haxelib" || true)"
          fi

      # -------- IMPORTANT: Pin Heaps to 1.10.0 and verify ----------
      - name: Install & pin required haxelib dependencies
        shell: bash
        run: |
          set -euxo pipefail

          # 1) Pin Heaps to pre-2.0 (1.10.0) so h3d.mat.DepthBuffer & h3d.pass.Base exist.
          #    If a dev/git copy were active anywhere, neutralize it first.
          #    (If a dev version were active, `haxelib set` would be ignored.)
          haxelib install heaps 1.10.0 --always || true
          haxelib set heaps 1.10.0

          # 2) JS/browser deps required by MBHaxe README
          haxelib install stb_ogg_sound --always
          haxelib install zip 1.1.0 --always || haxelib set zip 1.1.0

          # 3) Multiplayer transport used by your .hxml
          haxelib install colyseus-websocket --always
          haxelib install datachannel --always

          # 4) Haxe wrapper that invokes the npm 'uglify-js' binary
          haxelib install uglifyjs --always

          # --- Diagnostics (helpful if the runner somehow pulls Heaps 2.x) ---
          echo "=== HAXELIB LIST ==="
          haxelib list || true
          echo "=== HEAPS PATH ==="
          haxelib path heaps || true

      - name: Build (JS release if available, else JS debug)
        run: |
          set -euxo pipefail
          if [ -f compile-js-rel.hxml ]; then
            haxe compile-js-rel.hxml
          else
            haxe compile-js.hxml
          fi

      - name: Stage site
        shell: bash
        run: |
          rm -rf site
          mkdir -p site
          rsync -a ./ site/ \
            --delete \
            --exclude '.git' \
            --exclude '.github' \
            --exclude '.circleci' \
            --exclude 'src' \
            --exclude 'macos-dist' \
            --exclude '*.hxml' \
            --exclude '*.bat' \
            --exclude '*.sh' \
            --exclude 'README*' \
            --exclude 'LICENSE' \
            --exclude 'CHANGELOG.md'

      - name: Deploy → doggygamesshow123.github.io/MXHaxe/help
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.GH_PAGES_TOKEN }}   # classic PAT with repo scope
          external_repository: DoggyGamesShow123/DoggyGamesShow123.github.io
          publish_branch: main                           # change if your Pages repo uses "master"
          publish_dir: site
          destination_dir: MXHaxe/help

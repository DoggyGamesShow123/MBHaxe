name: Build & Deploy MBHaxe (JS → GitHub Pages subfolder)

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: mbhaxe-pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      # Java (some Haxe toolchains expect it)
      - name: Set up Java (Temurin 21)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      # Haxe 4.3.x (MBHaxe requires ≥ 4.3.0)
      - name: Set up Haxe
        uses: krdlab/setup-haxe@v2
        with:
          haxe-version: "4.3.7"

      # Node is required because the Haxe 'uglifyjs' lib shells out to the 'uglify-js' npm binary
      - name: Set up Node (for uglifyjs minification)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install uglify-js npm package (local)
        run: |
          npm init -y >/dev/null 2>&1 || true
          npm install uglify-js --save-dev --no-audit --no-fund
          # Put node_modules/.bin on PATH so 'uglifyjs' is discoverable
          echo "$(npm bin)" >> "$GITHUB_PATH"

      # ---- Correct haxelib repo initialization (do NOT use ~/.haxelib as a directory) ----
      - name: Initialize haxelib repo (idempotent)
        shell: bash
        run: |
          if [ ! -f "$HOME/.haxelib" ]; then
            mkdir -p "$HOME/haxelib"
            haxelib setup "$HOME/haxelib"
          else
            echo "haxelib already configured at: $(cat "$HOME/.haxelib" || true)"
          fi

      # -------- Pin all Haxe libs and verify versions (defensive) ----------
      - name: Install & pin required haxelib dependencies
        shell: bash
        run: |
          set -euxo pipefail

          # Neutralize any dev/git override for Heaps (dev overrides ignore 'set')
          # (Haxelib docs: 'haxelib git' enables development dir; use 'haxelib dev <lib>' to disable) 
          haxelib dev heaps || true

          # Heaps pre-2.0 so DepthBuffer + pass.Base exist
          haxelib install heaps 1.10.0 --always || true
          haxelib set heaps 1.10.0

          # JS/browser deps used by MBHaxe
          haxelib install stb_ogg_sound --always
          haxelib install zip 1.1.0 --always || haxelib set zip 1.1.0

          # Multiplayer transport used by your .hxml
          haxelib install colyseus-websocket --always
          haxelib install datachannel --always

          # Haxe wrapper that invokes the npm 'uglify-js' binary
          haxelib install uglifyjs --always

          # --- Diagnostics to confirm correct versions ---
          echo "=== HAXELIB LIST ==="
          haxelib list || true
          echo "=== HEAPS PATH ==="
          haxelib path heaps || true

      - name: Build (JS release if available, else JS debug)
        run: |
          set -euxo pipefail
          if [ -f compile-js-rel.hxml ]; then
            haxe compile-js-rel.hxml
          else
            haxe compile-js.hxml
          fi

      - name: Stage site
        shell: bash
        run: |
          rm -rf site
          mkdir -p site
          rsync -a ./ site/ \
            --delete \
            --exclude '.git' \
            --exclude '.github' \
            --exclude '.circleci' \
            --exclude 'src' \
            --exclude 'macos-dist' \
            --exclude '*.hxml' \
            --exclude '*.bat' \
            --exclude '*.sh' \
            --exclude 'README*' \
            --exclude 'LICENSE' \
            --exclude 'CHANGELOG.md'

      - name: Deploy → doggygamesshow123.github.io/MXHaxe/help
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.GH_PAGES_TOKEN }}   # classic PAT with 'repo' scope
          external_repository: DoggyGamesShow123/DoggyGamesShow123.github.io
          publish_branch: main                           # change if your Pages repo uses "master"
          publish_dir: site
          destination_dir: MXHaxe/help
          commit_message: "Deploy MBHaxe ${{ github.sha }} → /MXHaxe/help"

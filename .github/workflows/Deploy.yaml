- name: Initialize haxelib repo (idempotent)
  shell: bash
  run: |
    # ~/.haxelib is a *config file*; do not use it as the repo path.
    if [ ! -f "$HOME/.haxelib" ]; then
      mkdir -p "$HOME/haxelib"
      haxelib setup "$HOME/haxelib"
    else
      echo "haxelib already configured → $(cat "$HOME/.haxelib" || true)"
    fi
